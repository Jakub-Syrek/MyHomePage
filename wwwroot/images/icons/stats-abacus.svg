<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
  <title>Stats</title>
  <!-- frame -->
  <rect x="2.5" y="3" width="19" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
  <!-- rods -->
  <line x1="3.5" y1="7.5"  x2="20.5" y2="7.5"  stroke="#fff" stroke-width="1.2"/>
  <line x1="3.5" y1="12"   x2="20.5" y2="12"   stroke="#fff" stroke-width="1.2"/>
  <line x1="3.5" y1="16.5" x2="20.5" y2="16.5" stroke="#fff" stroke-width="1.2"/>
  <!-- top row beads: 2 left, 3 right -->
  <circle cx="6"  cy="7.5" r="1.4" fill="#f59e0b"/>
  <circle cx="8.8" cy="7.5" r="1.4" fill="#f59e0b"/>
  <circle cx="14" cy="7.5" r="1.4" fill="#fde68a"/>
  <circle cx="16.8" cy="7.5" r="1.4" fill="#fde68a"/>
  <circle cx="19.6" cy="7.5" r="1.4" fill="#fde68a"/>
  <!-- middle row: 4 left, 1 right -->
  <circle cx="6"  cy="12" r="1.4" fill="#ef4444"/>
  <circle cx="8.8" cy="12" r="1.4" fill="#ef4444"/>
  <circle cx="11.6" cy="12" r="1.4" fill="#ef4444"/>
  <circle cx="14.4" cy="12" r="1.4" fill="#ef4444"/>
  <circle cx="19.6" cy="12" r="1.4" fill="#fca5a5"/>
  <!-- bottom row: 1 left, 4 right -->
  <circle cx="6"  cy="16.5" r="1.4" fill="#22c55e"/>
  <circle cx="11.6" cy="16.5" r="1.4" fill="#bbf7d0"/>
  <circle cx="14.4" cy="16.5" r="1.4" fill="#bbf7d0"/>
  <circle cx="17.2" cy="16.5" r="1.4" fill="#bbf7d0"/>
  <circle cx="19.8" cy="16.5" r="1.4" fill="#bbf7d0"/>
</svg>
