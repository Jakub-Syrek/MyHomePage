<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="logoSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <linearGradient id="logoMountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D6D7E"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    <linearGradient id="logoMountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#85929E"/>
      <stop offset="100%" stop-color="#566573"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#logoSky)" stroke="white" stroke-width="2"/>
  <!-- Sun -->
  <circle cx="46" cy="22" r="5" fill="#FFA726"/>
  <!-- Back mountain -->
  <path d="M 8 50 L 22 28 L 32 38 L 42 30 L 56 50 Z" fill="url(#logoMountain2)"/>
  <!-- Front mountain (taller) -->
  <path d="M 5 54 L 22 22 L 35 42 L 45 32 L 60 54 Z" fill="url(#logoMountain1)"/>
  <!-- Snow cap on tallest peak -->
  <path d="M 17 30 L 22 22 L 27 30 L 24 27 L 22 28 L 20 27 Z" fill="white"/>
  <!-- Snow on second peak -->
  <path d="M 41 36 L 45 32 L 49 36 L 47 34 L 45 35 L 43 34 Z" fill="white"/>
  <!-- Bottom curve to mask -->
  <path d="M 2 50 Q 32 60 62 50 L 62 64 L 2 64 Z" fill="#52A6E5" opacity="0.3"/>
</svg>
